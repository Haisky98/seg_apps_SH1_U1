version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: auth_mysql
    restart: always
    environment:
      MYSQL_DATABASE: sistema_auth
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: auth_php_apache
    ports:
      - "8000:80"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - .:/var/www/html
    depends_on:
      - db

volumes:
  db_data: